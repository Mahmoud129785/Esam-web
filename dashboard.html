<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المستر عصام شويقة | لوحة التعلم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-animation"></div>
    
    <!-- رأس الصفحة -->
    <header class="dashboard-header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-chalkboard-user"></i>
                <h2>المستر عصام شويقة</h2>
                <span>لغة عربية - درجة أولى</span>
            </div>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- محتوى الكورس -->
        <div id="courseContent">
            <div class="course-header glass-card">
                <div class="course-info">
                    <h1><i class="fas fa-book"></i> كورس اللغة العربية</h1>
                    <p>مع المستر عصام شويقة - مدرس معتمد</p>
                </div>
            </div>

            <div class="lessons-section">
                <h2><i class="fas fa-video"></i> المحاضرات المتاحة</h2>
                <div class="lessons-grid" id="lessonsGrid">
                    <!-- سيتم عرض المحاضرات هنا من localStorage -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
