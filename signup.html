<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المستر عصام شويقة | إنشاء حساب</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="signup-card glass-card">
            <div class="logo-section">
                <i class="fas fa-user-graduate"></i>
                <h1>إنشاء حساب جديد</h1>
                <p>منصة المستر عصام شويقة</p>
            </div>
            <form id="signupForm">
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" placeholder="الاسم الأول" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="secondName" placeholder="الاسم الثاني" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="thirdName" placeholder="الاسم الثالث" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="studentId" placeholder="رقم الطالب" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="parentPhone" placeholder="رقم ولي الأمر" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="nationalId" placeholder="الرقم القومي" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <i class="fas fa-graduation-cap"></i>
                        <select id="grade" required>
                            <option value="">اختر الصف الدراسي</option>
                            <option value="اولى ثانوي">الصف الأول الثانوي</option>
                            <option value="تانية ثانوي">الصف الثاني الثانوي</option>
                            <option value="تالتة ثانوي">الصف الثالث الثانوي</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="كلمة المرور" required>
                    </div>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور" required>
                </div>
                <button type="submit" class="btn-primary">إنشاء حساب <i class="fas fa-arrow-left"></i></button>
            </form>
            <p class="login-link">لديك حساب؟ <a href="index.html">تسجيل الدخول</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
