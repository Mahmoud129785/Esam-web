<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المستر عصام شويقة | لوحة الأدمن</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-animation"></div>
    
    <header class="admin-header">
        <div class="header-content">
            <h2><i class="fas fa-crown"></i> لوحة تحكم الأدمن</h2>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <div class="admin-container">
        <!-- تبويبات -->
        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="users">👥 المستخدمين</button>
            <button class="tab-btn" data-tab="lessons">📹 المحاضرات</button>
            <button class="tab-btn" data-tab="approve">✅ تفعيل الحسابات</button>
        </div>

        <!-- تبويب المستخدمين -->
        <div id="usersTab" class="tab-content active">
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="🔍 بحث باسم أو بريد..." class="search-input">
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>#</th><th>الاسم</th><th>البريد</th><th>رقم الطالب</th><th>رقم ولي الأمر</th><th>الصف</th><th>الحالة</th><th>تاريخ التسجيل</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- تبويب المحاضرات -->
        <div id="lessonsTab" class="tab-content">
            <div class="add-lesson-form glass-card">
                <h3><i class="fas fa-plus-circle"></i> إضافة محاضرة جديدة</h3>
                <div class="form-row">
                    <input type="text" id="lessonTitle" placeholder="عنوان المحاضرة (مثال: المحاضرة الأولى - شرح درس)" class="form-input">
                    <input type="url" id="lessonUrl" placeholder="رابط الفيديو (YouTube أو MP4)" class="form-input">
                </div>
                <button id="addLessonBtn" class="btn-primary"><i class="fas fa-save"></i> إضافة المحاضرة</button>
            </div>
            
            <h3><i class="fas fa-list"></i> قائمة المحاضرات</h3>
            <div class="lessons-list" id="adminLessonsList"></div>
        </div>

        <!-- تبويب تفعيل الحسابات -->
        <div id="approveTab" class="tab-content">
            <h3><i class="fas fa-user-check"></i> طلبات التفعيل</h3>
            <div class="pending-users-list" id="pendingUsersList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
